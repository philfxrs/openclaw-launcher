name: Release On Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\build\Build-Installer.ps1 -SkipSigning

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: artifacts/installer/OpenClawSetup.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    env:
      OPENCLAW_MACOS_REQUIRE_SIGNING: true
      OPENCLAW_MACOS_APP_SIGN_IDENTITY: ${{ vars.OPENCLAW_MACOS_APP_SIGN_IDENTITY }}
      OPENCLAW_MACOS_PKG_SIGN_IDENTITY: ${{ vars.OPENCLAW_MACOS_PKG_SIGN_IDENTITY }}
      MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate signing and notarization inputs
        shell: bash
        run: |
          if [[ -z "$OPENCLAW_MACOS_APP_SIGN_IDENTITY" ]]; then
            echo "Missing repo variable OPENCLAW_MACOS_APP_SIGN_IDENTITY" >&2
            exit 1
          fi

          if [[ -z "$OPENCLAW_MACOS_PKG_SIGN_IDENTITY" ]]; then
            echo "Missing repo variable OPENCLAW_MACOS_PKG_SIGN_IDENTITY" >&2
            exit 1
          fi

          if [[ -z "$MACOS_CERT_P12_BASE64" || -z "$MACOS_CERT_PASSWORD" ]]; then
            echo "Missing secrets MACOS_CERT_P12_BASE64 or MACOS_CERT_PASSWORD" >&2
            exit 1
          fi

          if [[ -z "$APPLE_ID" || -z "$APPLE_TEAM_ID" || -z "$APPLE_APP_SPECIFIC_PASSWORD" ]]; then
            echo "Missing Apple notarization secrets (APPLE_ID/APPLE_TEAM_ID/APPLE_APP_SPECIFIC_PASSWORD)" >&2
            exit 1
          fi

      - name: Import Apple signing certificate
        shell: bash
        run: |
          CERT_PATH="$RUNNER_TEMP/macos-signing-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/openclaw-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 20)"

          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "OPENCLAW_SIGNING_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build macOS installer
        shell: bash
        run: |
          chmod +x ./build/Build-macOS-Installer.sh
          ./build/Build-macOS-Installer.sh

      - name: Notarize macOS package
        shell: bash
        run: |
          PKG_PATH="artifacts/installer-macos/OpenClawSetup-macOS.pkg"
          xcrun notarytool submit "$PKG_PATH" --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "$PKG_PATH"
          xcrun stapler validate "$PKG_PATH"

      - name: Verify Gatekeeper policy
        shell: bash
        run: |
          PKG_PATH="artifacts/installer-macos/OpenClawSetup-macOS.pkg"
          spctl -a -vv -t install "$PKG_PATH"

      - name: Upload macOS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: artifacts/installer-macos/OpenClawSetup-macOS.pkg
          if-no-files-found: error

      - name: Cleanup signing keychain
        if: always() && env.OPENCLAW_SIGNING_KEYCHAIN != ''
        shell: bash
        run: |
          security delete-keychain "$OPENCLAW_SIGNING_KEYCHAIN" || true

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-assets

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: macos-installer
          path: release-assets

      - name: Prepare release notes
        id: meta
        shell: bash
        run: |
          WIN="release-assets/OpenClawSetup.exe"
          MAC="release-assets/OpenClawSetup-macOS.pkg"

          if [[ ! -f "$WIN" ]]; then
            echo "Missing Windows installer: $WIN" >&2
            exit 1
          fi

          if [[ ! -f "$MAC" ]]; then
            echo "Missing macOS installer: $MAC" >&2
            exit 1
          fi

          WIN_HASH=$(sha256sum "$WIN" | awk '{print $1}')
          MAC_HASH=$(sha256sum "$MAC" | awk '{print $1}')
          WIN_SIZE=$(stat -c%s "$WIN")
          MAC_SIZE=$(stat -c%s "$MAC")

          {
            echo "win_hash=$WIN_HASH"
            echo "mac_hash=$MAC_HASH"
            echo "win_size=$WIN_SIZE"
            echo "mac_size=$MAC_SIZE"
          } >> "$GITHUB_OUTPUT"

          {
            echo "OpenClaw 自动构建发布（Windows + macOS）。"
            echo
            echo "## 下载"
            echo "- Windows: OpenClawSetup.exe"
            echo "- macOS: OpenClawSetup-macOS.pkg"
            echo
            echo "## 文件校验"
            echo "- OpenClawSetup.exe"
            echo "  - 大小(字节): $WIN_SIZE"
            echo "  - SHA256: $WIN_HASH"
            echo "- OpenClawSetup-macOS.pkg"
            echo "  - 大小(字节): $MAC_SIZE"
            echo "  - SHA256: $MAC_HASH"
          } > release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            release-assets/OpenClawSetup.exe
            release-assets/OpenClawSetup-macOS.pkg
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
