name: Release On Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\build\Build-Installer.ps1 -SkipSigning

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: artifacts/installer/OpenClawSetup.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build macOS installer
        shell: bash
        run: |
          chmod +x ./build/Build-macOS-Installer.sh
          ./build/Build-macOS-Installer.sh

      - name: Upload macOS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: artifacts/installer-macos/OpenClawSetup-macOS.pkg
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-assets

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: macos-installer
          path: release-assets

      - name: Prepare release notes
        id: meta
        shell: bash
        run: |
          WIN="release-assets/OpenClawSetup.exe"
          MAC="release-assets/OpenClawSetup-macOS.pkg"

          if [[ ! -f "$WIN" ]]; then
            echo "Missing Windows installer: $WIN" >&2
            exit 1
          fi

          if [[ ! -f "$MAC" ]]; then
            echo "Missing macOS installer: $MAC" >&2
            exit 1
          fi

          WIN_HASH=$(sha256sum "$WIN" | awk '{print $1}')
          MAC_HASH=$(sha256sum "$MAC" | awk '{print $1}')
          WIN_SIZE=$(stat -c%s "$WIN")
          MAC_SIZE=$(stat -c%s "$MAC")

          {
            echo "win_hash=$WIN_HASH"
            echo "mac_hash=$MAC_HASH"
            echo "win_size=$WIN_SIZE"
            echo "mac_size=$MAC_SIZE"
          } >> "$GITHUB_OUTPUT"

          {
            echo "OpenClaw 自动构建发布（Windows + macOS）。"
            echo
            echo "## 下载"
            echo "- Windows: OpenClawSetup.exe"
            echo "- macOS: OpenClawSetup-macOS.pkg"
            echo
            echo "## 文件校验"
            echo "- OpenClawSetup.exe"
            echo "  - 大小(字节): $WIN_SIZE"
            echo "  - SHA256: $WIN_HASH"
            echo "- OpenClawSetup-macOS.pkg"
            echo "  - 大小(字节): $MAC_SIZE"
            echo "  - SHA256: $MAC_HASH"
          } > release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            release-assets/OpenClawSetup.exe
            release-assets/OpenClawSetup-macOS.pkg
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
